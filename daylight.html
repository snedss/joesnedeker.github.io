<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daylight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;height:-webkit-fill-available;}
body{width:100vw;height:100vh;height:100dvh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}

#location-screen{position:fixed;inset:0;z-index:200;background:#05060f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity 0.8s ease;padding:24px;}
#location-screen.hidden{opacity:0;pointer-events:none;}
#location-screen h1{font-size:18px;font-weight:400;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.6);}
#location-screen p{font-size:12px;color:rgba(255,255,255,0.3);text-align:center;max-width:280px;line-height:1.7;}
.loc-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:24px;color:#fff;font-size:12px;font-family:inherit;letter-spacing:0.12em;text-transform:uppercase;padding:10px 24px;cursor:pointer;width:240px;text-align:center;transition:background 0.2s;}
.loc-btn:hover{background:rgba(255,255,255,0.16);}
#location-divider{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.2);}
#location-form{display:flex;gap:8px;width:240px;}
#location-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);border-radius:24px;color:#fff;font-size:12px;padding:10px 16px;outline:none;font-family:inherit;}
#location-input::placeholder{color:rgba(255,255,255,0.25);}
#location-input:focus{border-color:rgba(255,255,255,0.4);}
#location-submit{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:50%;color:#fff;font-size:14px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;flex-shrink:0;}
#location-error{font-size:11px;color:rgba(255,120,100,0.8);min-height:16px;}

#sky{width:100%;height:100vh;height:100dvh;position:relative;overflow:hidden;}
#sun-moon{position:absolute;border-radius:50%;z-index:2;pointer-events:none;}
#moon-canvas{position:absolute;inset:0;pointer-events:none;z-index:2;}
#horizon-glow{position:absolute;bottom:0;left:0;right:0;height:35%;pointer-events:none;transition:all 2s ease;z-index:1;}
#rain-canvas,#stars{position:absolute;inset:0;pointer-events:none;z-index:3;}
#clouds{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
.cloud{position:absolute;border-radius:50%;filter:blur(22px);transition:opacity 4s ease,background 4s ease;}
#fog-overlay{position:absolute;inset:0;pointer-events:none;transition:opacity 3s ease;z-index:4;}

#info{position:absolute;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;user-select:none;white-space:nowrap;z-index:10;}
#time-display{font-size:15px;font-weight:500;letter-spacing:0.08em;opacity:0.8;transition:color 2s ease;}
#phase-display{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.5;margin-top:3px;transition:color 2s ease;}
#weather-display{font-size:11px;letter-spacing:0.08em;opacity:0.55;margin-top:2px;transition:color 2s ease;}
#moon-phase-display{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.3;margin-top:2px;transition:color 2s ease;}

.panel-btn{position:absolute;bottom:calc(24px + env(safe-area-inset-bottom,0px));z-index:30;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:20px;color:rgba(255,255,255,0.6);font-size:10px;font-family:inherit;letter-spacing:0.14em;text-transform:uppercase;padding:7px 16px;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:background 0.2s;}
.panel-btn:hover{background:rgba(255,255,255,0.14);}
#radar-btn{right:24px;}
#forecast-btn{left:24px;}

.slide-panel{position:absolute;bottom:0;left:0;right:0;height:0;overflow:hidden;z-index:25;transition:height 0.4s cubic-bezier(0.4,0,0.2,1);background:rgba(8,10,22,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,0.07);}
.slide-panel.open{height:46%;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px 0;}
.ph-title{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.45);}
.ph-sub{font-size:10px;letter-spacing:0.1em;color:rgba(255,255,255,0.18);}
.panel-body{position:absolute;top:42px;left:0;right:0;bottom:0;overflow:hidden;}

/* Radar */
#radar-map{width:100%;height:100%;background:#06080f;}
#radar-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.25);z-index:10;background:#06080f;}
.leaflet-control-attribution,.leaflet-bottom.leaflet-right{display:none!important;}
.leaflet-control-zoom a{background:rgba(20,22,36,0.9)!important;border-color:rgba(255,255,255,0.1)!important;color:rgba(255,255,255,0.5)!important;}
.leaflet-control-zoom a:hover{background:rgba(40,44,70,0.9)!important;}

/* Forecast */
#forecast-scroll{display:flex;height:100%;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;}
#forecast-scroll::-webkit-scrollbar{display:none;}
.fc-day{flex:1;min-width:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px 4px;border-right:1px solid rgba(255,255,255,0.05);}
.fc-day:last-child{border-right:none;}
.fc-dow{font-size:9px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.35);}
.fc-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.fc-icon svg{width:28px;height:28px;}
.fc-hi{font-size:18px;font-weight:300;color:rgba(255,255,255,0.9);}
.fc-lo{font-size:11px;font-weight:300;color:rgba(255,255,255,0.28);margin-top:1px;}
.fc-desc{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.22);text-align:center;line-height:1.5;}
#forecast-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.25);}
</style>
</head>
<body>

<div id="location-screen">
  <h1>Daylight</h1>
  <p>Enter your location to see live sky and weather.</p>
  <button class="loc-btn" id="gps-btn">Use My Location</button>
  <div id="location-divider">or</div>
  <div id="location-form">
    <input id="location-input" type="text" placeholder="City or zip code"/>
    <button id="location-submit">→</button>
  </div>
  <div id="location-error"></div>
</div>

<div id="sky">
  <canvas id="stars"></canvas>
  <canvas id="rain-canvas"></canvas>
  <canvas id="moon-canvas"></canvas>
  <div id="fog-overlay"></div>
  <div id="clouds">
    <div class="cloud" id="c1" style="width:260px;height:90px;top:12%;left:8%"></div>
    <div class="cloud" id="c2" style="width:320px;height:100px;top:22%;left:52%"></div>
    <div class="cloud" id="c3" style="width:200px;height:75px;top:32%;left:28%"></div>
    <div class="cloud" id="c4" style="width:280px;height:85px;top:15%;left:70%"></div>
    <div class="cloud" id="c5" style="width:240px;height:80px;top:38%;left:60%"></div>
  </div>
  <div id="sun-moon"></div>
  <div id="horizon-glow"></div>

  <div class="slide-panel" id="radar-panel">
    <div class="panel-header">
      <span class="ph-title" id="radar-title">Radar</span>
      <span class="ph-sub">NEXRAD</span>
    </div>
    <div class="panel-body">
      <div id="radar-loading">Loading radar…</div>
      <div id="radar-map"></div>
    </div>
  </div>

  <div class="slide-panel" id="forecast-panel">
    <div class="panel-header">
      <span class="ph-title">7-Day Forecast</span>
      <span class="ph-sub" id="forecast-sub"></span>
    </div>
    <div class="panel-body">
      <div id="forecast-loading">Loading forecast…</div>
      <div id="forecast-scroll"></div>
    </div>
  </div>

  <div id="info">
    <div id="time-display"></div>
    <div id="phase-display"></div>
    <div id="weather-display"></div>
    <div id="moon-phase-display"></div>
  </div>
  <button class="panel-btn" id="forecast-btn">Forecast</button>
  <button class="panel-btn" id="radar-btn">Radar</button>
</div>

<script>
let LAT=null,LON=null,CITY='';
let wx={cloudCover:0,isRain:false,isSnow:false,isFog:false,isThunder:false,temp:null,desc:''};
let rain=[],snow=[],lastFlash=0;
let radarOpen=false,radarLoaded=false,forecastOpen=false,forecastLoaded=false,rMap=null;

// Location
document.getElementById('gps-btn').addEventListener('click',()=>{
  setErr('');
  if(!navigator.geolocation)return setErr('Geolocation not supported.');
  document.getElementById('gps-btn').textContent='Locating…';
  navigator.geolocation.getCurrentPosition(
    p=>{LAT=p.coords.latitude;LON=p.coords.longitude;launch();},
    ()=>{setErr('Location denied. Try a city name.');document.getElementById('gps-btn').textContent='Use My Location';}
  );
});
document.getElementById('location-submit').addEventListener('click',geo);
document.getElementById('location-input').addEventListener('keydown',e=>{if(e.key==='Enter')geo();});
function setErr(m){document.getElementById('location-error').textContent=m;}

async function geo(){
  const v=document.getElementById('location-input').value.trim();
  if(!v)return setErr('Please enter a city or zip.');
  setErr('');document.getElementById('location-submit').textContent='…';
  try{
    const d=await(await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=1&language=en&format=json`)).json();
    if(!d.results?.length){setErr('Not found.');document.getElementById('location-submit').textContent='→';return;}
    const r=d.results[0];LAT=r.latitude;LON=r.longitude;CITY=r.name+(r.admin1?', '+r.admin1:'');launch();
  }catch{setErr('Could not look up location.');document.getElementById('location-submit').textContent='→';}
}

function launch(){
  document.getElementById('radar-title').textContent=CITY||'Radar';
  document.getElementById('forecast-sub').textContent=CITY;
  const s=document.getElementById('location-screen');s.classList.add('hidden');setTimeout(()=>s.style.display='none',800);
  fetchWx();setInterval(fetchWx,10*60*1000);
  initStars();initPC();initMC();
  animP();setInterval(update,2000);update();
}

// Panels
function closeAll(){
  radarOpen=forecastOpen=false;
  document.getElementById('radar-panel').classList.remove('open');
  document.getElementById('forecast-panel').classList.remove('open');
  document.getElementById('radar-btn').textContent='Radar';
  document.getElementById('forecast-btn').textContent='Forecast';
}
document.getElementById('radar-btn').addEventListener('click',function(){
  if(radarOpen){closeAll();return;}
  closeAll();radarOpen=true;
  document.getElementById('radar-panel').classList.add('open');
  this.textContent='Close';
  if(!radarLoaded){radarLoaded=true;loadLeaflet().then(initRadar);}
  else if(rMap)setTimeout(()=>rMap.invalidateSize(),450);
});
document.getElementById('forecast-btn').addEventListener('click',function(){
  if(forecastOpen){closeAll();return;}
  closeAll();forecastOpen=true;
  document.getElementById('forecast-panel').classList.add('open');
  this.textContent='Close';
  if(!forecastLoaded){forecastLoaded=true;fetchForecast();}
});

// Leaflet
function loadLeaflet(){
  return new Promise(res=>{
    if(window.L){res();return;}
    const l=document.createElement('link');l.rel='stylesheet';l.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';document.head.appendChild(l);
    const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';s.onload=res;document.head.appendChild(s);
  });
}

// Radar — Iowa State Mesonet NEXRAD (free, no key, good zoom)
async function initRadar(){
  await new Promise(r=>setTimeout(r,430));
  const el=document.getElementById('radar-map');
  el.style.cssText='position:absolute;inset:0;width:100%;height:100%;';
  rMap=L.map(el,{zoomControl:true,attributionControl:false,preferCanvas:true}).setView([LAT,LON],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(rMap);
  // NEXRAD composite via Iowa State Mesonet — solid zoom support
  L.tileLayer('https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png',{
    opacity:0.7,maxZoom:16,maxNativeZoom:16,updateWhenIdle:false
  }).addTo(rMap);
  // Road/label overlay on top so geography is readable
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,pane:'overlayPane'}).addTo(rMap);
  document.getElementById('radar-loading').style.display='none';
  rMap.invalidateSize();
}

// Forecast SVG icons — solid minimal shapes
function fcIcon(code){
  const w='rgba(255,255,255,0.82)',d='rgba(255,255,255,0.28)';
  if(code===0) return `<svg viewBox="0 0 28 28"><circle cx="14" cy="14" r="6" fill="${w}"/><g stroke="${w}" stroke-width="1.5" stroke-linecap="round">${[0,45,90,135,180,225,270,315].map(a=>{const r=a*Math.PI/180,x1=14+Math.cos(r)*9,y1=14+Math.sin(r)*9,x2=14+Math.cos(r)*12,y2=14+Math.sin(r)*12;return`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;}).join('')}</g></svg>`;
  if(code<=2) return `<svg viewBox="0 0 28 28"><circle cx="10" cy="12" r="4" fill="${w}" opacity="0.6"/><ellipse cx="17" cy="17" rx="7" ry="5" fill="${w}"/><ellipse cx="11" cy="18" rx="5" ry="4" fill="${w}"/></svg>`;
  if(code<=3) return `<svg viewBox="0 0 28 28"><ellipse cx="15" cy="15" rx="9" ry="6.5" fill="${w}"/><ellipse cx="10" cy="16" rx="6" ry="5" fill="${w}"/></svg>`;
  if(code<=49) return `<svg viewBox="0 0 28 28">${[6,10,14,18,22].map((x,i)=>`<line x1="${x}" y1="${11+i%2*2}" x2="${x}" y2="${17+i%2*2}" stroke="${w}" stroke-width="1.5" stroke-linecap="round" opacity="${0.3+i*0.14}"/>`).join('')}</svg>`;
  if(code<=67||code<=82) return `<svg viewBox="0 0 28 28"><ellipse cx="15" cy="11" rx="8" ry="5.5" fill="${w}"/><ellipse cx="9" cy="12" rx="5" ry="4" fill="${w}"/>${[[9,20],[14,22],[19,20],[12,25],[17,24]].map(([x,y])=>`<ellipse cx="${x}" cy="${y}" rx="1.2" ry="2.5" fill="${d}"/>`).join('')}</svg>`;
  if(code<=77||code<=86) return `<svg viewBox="0 0 28 28"><ellipse cx="15" cy="11" rx="8" ry="5.5" fill="${w}"/><ellipse cx="9" cy="12" rx="5" ry="4" fill="${w}"/>${[[9,21],[14,21],[19,21],[12,25],[17,25]].map(([x,y])=>`<circle cx="${x}" cy="${y}" r="2" fill="${d}"/>`).join('')}</svg>`;
  return `<svg viewBox="0 0 28 28"><ellipse cx="15" cy="10" rx="8" ry="5" fill="${w}"/><ellipse cx="9" cy="11" rx="5" ry="4" fill="${w}"/><polygon points="16,16 12,22 15,22 11,28 20,20 16,20 19,16" fill="${d}"/></svg>`;
}

function wmoDesc(c){
  if(c===0)return'Clear';if(c<=2)return'Partly cloudy';if(c===3)return'Overcast';
  if(c<=49)return'Foggy';if(c<=55)return'Drizzle';if(c<=67)return'Rain';
  if(c<=77)return'Snow';if(c<=82)return'Showers';if(c<=86)return'Snow showers';
  if(c<=99)return'Thunderstorm';return'Cloudy';
}
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function fetchForecast(){
  try{
    const d=await(await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto&forecast_days=7`)).json();
    document.getElementById('forecast-loading').style.display='none';
    const c=document.getElementById('forecast-scroll');c.innerHTML='';
    d.daily.time.forEach((ds,i)=>{
      const day=new Date(ds+'T12:00:00');
      const el=document.createElement('div');el.className='fc-day';
      el.innerHTML=`<div class="fc-dow">${i===0?'Today':DAYS[day.getDay()]}</div><div class="fc-icon">${fcIcon(d.daily.weather_code[i])}</div><div class="fc-hi">${Math.round(d.daily.temperature_2m_max[i])}°</div><div class="fc-lo">${Math.round(d.daily.temperature_2m_min[i])}°</div><div class="fc-desc">${wmoDesc(d.daily.weather_code[i])}</div>`;
      c.appendChild(el);
    });
  }catch{document.getElementById('forecast-loading').textContent='Forecast unavailable';}
}

// Stars
const sC=document.getElementById('stars'),sX=sC.getContext('2d');let stars=[];
function initStars(){
  const dpr=devicePixelRatio||1,w=innerWidth,h=innerHeight;
  sC.width=w*dpr;sC.height=h*dpr;sC.style.width=w+'px';sC.style.height=h+'px';sX.setTransform(dpr,0,0,dpr,0,0);
  stars=Array.from({length:200},()=>({x:Math.random()*w,y:Math.random()*h*0.8,r:Math.random()*1.1+0.2,a:Math.random()*0.8+0.2}));
}
function drawStars(op){
  sX.clearRect(0,0,innerWidth,innerHeight);if(op<=0)return;
  stars.forEach(s=>{sX.beginPath();sX.arc(s.x,s.y,s.r,0,Math.PI*2);sX.fillStyle=`rgba(255,255,255,${s.a*op})`;sX.fill();});
}

// Precip
const pC=document.getElementById('rain-canvas'),pX=pC.getContext('2d');
function initPC(){const dpr=devicePixelRatio||1,w=innerWidth,h=innerHeight;pC.width=w*dpr;pC.height=h*dpr;pC.style.width=w+'px';pC.style.height=h+'px';pX.setTransform(dpr,0,0,dpr,0,0);}
function animP(){
  const w=innerWidth,h=innerHeight;pX.clearRect(0,0,w,h);
  if(wx.isRain||wx.isThunder){
    while(rain.length<220)rain.push({x:Math.random()*w,y:Math.random()*h,len:Math.random()*12+6,sp:Math.random()*7+9,op:Math.random()*0.35+0.15});
    rain.forEach(d=>{pX.beginPath();pX.moveTo(d.x,d.y);pX.lineTo(d.x+d.len*0.12,d.y+d.len);pX.strokeStyle=`rgba(180,210,255,${d.op})`;pX.lineWidth=0.7;pX.stroke();d.y+=d.sp;d.x+=1.2;if(d.y>h||d.x>w){d.y=-20;d.x=Math.random()*w;}});
  }else rain=[];
  if(wx.isSnow){
    while(snow.length<160)snow.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2.2+0.8,sp:Math.random()*1.2+0.4,dr:Math.random()*0.6-0.3,op:Math.random()*0.55+0.3});
    snow.forEach(f=>{pX.beginPath();pX.arc(f.x,f.y,f.r,0,Math.PI*2);pX.fillStyle=`rgba(255,255,255,${f.op})`;pX.fill();f.y+=f.sp;f.x+=f.dr;if(f.y>h){f.y=-10;f.x=Math.random()*w;}});
  }else snow=[];
  requestAnimationFrame(animP);
}

// Moon — glow sphere with phase shadow
const mC=document.getElementById('moon-canvas'),mX=mC.getContext('2d');
function initMC(){const dpr=devicePixelRatio||1,w=innerWidth,h=innerHeight;mC.width=w*dpr;mC.height=h*dpr;mC.style.width=w+'px';mC.style.height=h+'px';mX.setTransform(dpr,0,0,dpr,0,0);}
function lunarPhase(){const k=new Date('2000-01-06T18:14:00Z'),s=29.53058867,diff=(Date.now()-k)/86400000;return((diff%s)+s)%s/s;}
function lunarName(p){if(p<0.03||p>0.97)return'New Moon';if(p<0.22)return'Waxing Crescent';if(p<0.28)return'First Quarter';if(p<0.47)return'Waxing Gibbous';if(p<0.53)return'Full Moon';if(p<0.72)return'Waning Gibbous';if(p<0.78)return'Last Quarter';return'Waning Crescent';}

function renderMoon(bx,by,sz,opacity){
  const w=innerWidth,h=innerHeight;
  mX.clearRect(0,0,w,h);
  if(opacity<=0)return;
  const cx=bx/100*w, cy=by/100*h, r=sz/2;
  const phase=lunarPhase();
  // illum: 0=new moon, 1=full moon
  const illum=phase<=0.5?phase*2:(1-phase)*2;
  const waxing=phase<0.5;

  mX.save();
  mX.globalAlpha=opacity;

  // Outer glow
  const glow=mX.createRadialGradient(cx,cy,r*0.8,cx,cy,r*3.5);
  glow.addColorStop(0,`rgba(215,205,160,${0.14*illum+0.04})`);
  glow.addColorStop(1,'rgba(215,205,160,0)');
  mX.beginPath();mX.arc(cx,cy,r*3.5,0,Math.PI*2);mX.fillStyle=glow;mX.fill();

  // Clip everything to disc
  mX.save();
  mX.beginPath();mX.arc(cx,cy,r,0,Math.PI*2);mX.clip();

  // Dark base (unlit side color)
  mX.fillStyle='#080c1a';
  mX.fillRect(cx-r,cy-r,r*2,r*2);

  // Lit surface — use offscreen canvas rendered via pixel shader approach
  // We draw the lit hemisphere by painting column by column using the
  // sphere's surface normal to determine lit vs shadow with a soft terminator
  const res=r*2+2;
  const imgData=mX.createImageData(Math.ceil(res),Math.ceil(res));
  const ox=cx-r, oy=cy-r;

  for(let py=0;py<Math.ceil(res);py++){
    for(let px=0;px<Math.ceil(res);px++){
      // Normalize to [-1,1] sphere coords
      const nx=(px-r)/r, ny=(py-r)/r;
      const nz2=1-nx*nx-ny*ny;
      if(nz2<0)continue; // outside disc
      const nz=Math.sqrt(nz2);

      // Terminator: for a sphere, the lit/dark boundary is where
      // dot(normal, lightDir) = 0. Light direction in x depends on phase.
      // illum=0: light from far left (new), illum=1: light from front (full)
      // Map illum to a light x-direction
      // waxing: light comes from right side, waning: from left
      const lightX = waxing ? (illum*2-1) : (1-illum*2);
      const lightZ = Math.sqrt(Math.max(0,1-lightX*lightX));
      // dot product of surface normal with light direction
      const dot = nx*lightX + nz*lightZ;

      // Soft terminator — sigmoid around dot=0
      const litFactor=Math.max(0, Math.tanh(dot*6)*0.5+0.5);

      // Surface color interpolated between dark and lit
      const litR=240,litG=228,litB=185;
      const darkR=8,darkG=10,darkB=24;
      const sr=Math.round(darkR+(litR-darkR)*litFactor);
      const sg=Math.round(darkG+(litG-darkG)*litFactor);
      const sb=Math.round(darkB+(litB-darkB)*litFactor);

      // Limb darkening — dims toward edge of sphere
      const limb=nz*0.55+0.45;

      const idx=(py*Math.ceil(res)+px)*4;
      imgData.data[idx]=sr*limb;
      imgData.data[idx+1]=sg*limb;
      imgData.data[idx+2]=sb*limb;
      imgData.data[idx+3]=255;
    }
  }
  mX.putImageData(imgData,Math.floor(ox),Math.floor(oy));

  // Subtle specular highlight
  const spec=mX.createRadialGradient(cx-r*0.2,cy-r*0.25,0,cx-r*0.2,cy-r*0.25,r*0.7);
  spec.addColorStop(0,`rgba(255,252,235,${0.18*illum})`);
  spec.addColorStop(1,'rgba(255,252,235,0)');
  mX.beginPath();mX.arc(cx,cy,r,0,Math.PI*2);mX.fillStyle=spec;mX.fill();

  mX.restore();
  mX.restore();
}

// Weather
function interpWMO(c){
  if(c===0)return{desc:'clear',isRain:false,isSnow:false,isFog:false,isThunder:false};
  if(c<=2)return{desc:'partly cloudy',isRain:false,isSnow:false,isFog:false,isThunder:false};
  if(c===3)return{desc:'overcast',isRain:false,isSnow:false,isFog:false,isThunder:false};
  if(c<=49)return{desc:'foggy',isRain:false,isSnow:false,isFog:true,isThunder:false};
  if(c<=67)return{desc:'rain',isRain:true,isSnow:false,isFog:false,isThunder:false};
  if(c<=77)return{desc:'snow',isRain:false,isSnow:true,isFog:false,isThunder:false};
  if(c<=82)return{desc:'rain showers',isRain:true,isSnow:false,isFog:false,isThunder:false};
  if(c<=86)return{desc:'snow showers',isRain:false,isSnow:true,isFog:false,isThunder:false};
  if(c<=99)return{desc:'thunderstorm',isRain:true,isSnow:false,isFog:false,isThunder:true};
  return{desc:'cloudy',isRain:false,isSnow:false,isFog:false,isThunder:false};
}
async function fetchWx(){
  if(!LAT)return;
  try{
    const d=await(await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,cloud_cover,weather_code&temperature_unit=fahrenheit&timezone=auto`)).json();
    const c=d.current;wx={...wx,...interpWMO(c.weather_code),cloudCover:c.cloud_cover/100,temp:Math.round(c.temperature_2m)};
  }catch(e){console.warn(e);}
}

// Interpolation
const lerp=(a,b,t)=>a+(b-a)*t;
const hex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
function lc(a,b,t){const[r1,g1,b1]=hex(a),[r2,g2,b2]=hex(b);return`rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;}

const SKY=[
  {h:0,top:'#020510',bot:'#0a0820',phase:'midnight',text:'#aabbff'},
  {h:4,top:'#05081a',bot:'#0d0f28',phase:'late night',text:'#aabbff'},
  {h:5,top:'#1a1535',bot:'#3d2247',phase:'pre-dawn',text:'#ccaaff'},
  {h:6,top:'#e8632a',bot:'#f5a04a',phase:'sunrise',text:'#fff3e0'},
  {h:7,top:'#6ca0d4',bot:'#f7c97a',phase:'early morning',text:'#fff8ee'},
  {h:9,top:'#4a8ec2',bot:'#a8d0f0',phase:'morning',text:'#e8f4ff'},
  {h:12,top:'#1a6dc4',bot:'#87ceeb',phase:'midday',text:'#e0f0ff'},
  {h:15,top:'#2878c8',bot:'#9fd8f5',phase:'afternoon',text:'#e8f4ff'},
  {h:17,top:'#c06020',bot:'#f0a050',phase:'golden hour',text:'#fff0cc'},
  {h:18,top:'#e04010',bot:'#f06030',phase:'sunset',text:'#ffe8cc'},
  {h:19,top:'#7030a0',bot:'#e07030',phase:'dusk',text:'#ffccaa'},
  {h:20,top:'#2a1545',bot:'#5a2060',phase:'twilight',text:'#ddaaff'},
  {h:21,top:'#0a0818',bot:'#150d28',phase:'evening',text:'#aabbff'},
  {h:24,top:'#020510',bot:'#0a0820',phase:'midnight',text:'#aabbff'},
];
const BODY=[
  {h:0,x:50,y:110,sz:58,col:'#e8d090',so:1,moon:true},
  {h:4,x:30,y:85,sz:54,col:'#e8d090',so:1,moon:true},
  {h:5,x:15,y:65,sz:50,col:'#f0c070',so:0.6,moon:true},
  {h:6,x:8,y:45,sz:54,col:'#ff8020',so:0.1,moon:false},
  {h:7,x:18,y:30,sz:60,col:'#ffaa30',so:0,moon:false},
  {h:9,x:35,y:18,sz:65,col:'#ffcc50',so:0,moon:false},
  {h:12,x:50,y:10,sz:70,col:'#fff5aa',so:0,moon:false},
  {h:15,x:65,y:18,sz:65,col:'#ffcc50',so:0,moon:false},
  {h:17,x:78,y:28,sz:63,col:'#ff9a20',so:0,moon:false},
  {h:18,x:88,y:42,sz:56,col:'#ff6010',so:0.1,moon:false},
  {h:19,x:93,y:58,sz:50,col:'#e07830',so:0.4,moon:true},
  {h:20,x:85,y:75,sz:50,col:'#d8c080',so:0.7,moon:true},
  {h:21,x:72,y:88,sz:54,col:'#e8d090',so:0.95,moon:true},
  {h:24,x:50,y:110,sz:58,col:'#e8d090',so:1,moon:true},
];
function interp(F,hf){for(let i=0;i<F.length-1;i++){if(hf>=F[i].h&&hf<F[i+1].h){const t=(hf-F[i].h)/(F[i+1].h-F[i].h);return{a:F[i],b:F[i+1],t};}}return{a:F[F.length-1],b:F[F.length-1],t:0};}
function fmtTime(d){let h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return`${h}:${String(m).padStart(2,'0')} ${ap}`;}

function maybeThunder(){
  if(!wx.isThunder)return;
  const n=Date.now();
  if(n-lastFlash>8000+Math.random()*12000){lastFlash=n;const s=document.getElementById('sky');s.style.transition='background 0.05s';s.style.background='rgba(220,230,255,0.92)';setTimeout(()=>{s.style.transition='background 2s ease';update();},80);}
}

function update(){
  const now=new Date(),hf=now.getHours()+now.getMinutes()/60+now.getSeconds()/3600;
  const cc=wx.cloudCover,night=hf<6||hf>20;
  const{a:ka,b:kb,t:kt}=interp(SKY,hf);
  let top=lc(ka.top,kb.top,kt),bot=lc(ka.bot,kb.bot,kt);
  const tc=lc(ka.text,kb.text,kt),ph=kt<0.5?ka.phase:kb.phase;
  if(cc>0){const ct=night?'#1a1a22':wx.isThunder?'#2a2a35':'#7a8a9a',cb=night?'#22222e':wx.isThunder?'#353545':'#a0aab5';top=lc(top,ct,cc*0.85);bot=lc(bot,cb,cc*0.85);}
  document.getElementById('sky').style.background=`linear-gradient(to bottom,${top} 0%,${bot} 100%)`;

  const{a:ba,b:bb,t:bt}=interp(BODY,hf);
  const bx=lerp(ba.x,bb.x,bt),by=lerp(ba.y,bb.y,bt),bsz=lerp(ba.sz,bb.sz,bt),bcol=lc(ba.col,bb.col,bt),sop=lerp(ba.so,bb.so,bt);
  const moon=bt<0.5?ba.moon:bb.moon,bop=Math.max(0,1-cc*1.35);
  const sm=document.getElementById('sun-moon');

  if(moon){
    sm.style.cssText='position:absolute;width:0;height:0;opacity:0;';
    renderMoon(bx,by,bsz,bop);
  }else{
    mX.clearRect(0,0,innerWidth,innerHeight);
    sm.style.cssText=`position:absolute;border-radius:50%;left:calc(${bx}% - ${bsz/2}px);top:calc(${by}% - ${bsz/2}px);width:${bsz}px;height:${bsz}px;opacity:${bop};background:radial-gradient(circle at 40% 38%,#fffde0,${bcol});box-shadow:0 0 ${bsz}px ${bcol},0 0 ${bsz*2}px rgba(255,200,80,0.5),0 0 ${bsz*4}px rgba(255,160,40,0.18);z-index:2;`;
  }

  drawStars(sop*(1-cc));

  const hg=document.getElementById('horizon-glow'),golden=(hf>=5.5&&hf<=8)||(hf>=17&&hf<=20),gs=1-cc*0.9;
  hg.style.background=golden&&gs>0.05?`linear-gradient(to top,rgba(255,${hf<12?130:100},40,${0.42*gs}),transparent)`:hf>=20||hf<5?'linear-gradient(to top,rgba(30,10,60,0.38),transparent)':'linear-gradient(to top,rgba(120,180,255,0.08),transparent)';

  ['c1','c2','c3','c4','c5'].forEach((id,i)=>{
    const el=document.getElementById(id),ops=[0.18,0.13,0.16,0.14,0.12];
    if(cc>0.05){el.style.background=night?'rgba(55,58,78,1)':wx.isThunder?'rgba(48,50,65,1)':'rgba(255,255,255,1)';el.style.opacity=i<Math.ceil(cc*5)?ops[i]+cc*0.52:0;}
    else el.style.opacity=0;
  });

  const fog=document.getElementById('fog-overlay');
  fog.style.background=wx.isFog?'radial-gradient(ellipse at 50% 80%,rgba(200,210,220,0.5) 0%,rgba(180,190,205,0.25) 60%,transparent 100%)':'';
  fog.style.opacity=wx.isFog?1:0;

  maybeThunder();

  ['time-display','phase-display','weather-display','moon-phase-display'].forEach(id=>document.getElementById(id).style.color=tc);
  document.getElementById('time-display').textContent=fmtTime(now);
  document.getElementById('phase-display').textContent=ph;
  document.getElementById('weather-display').textContent=wx.desc?(wx.desc+(wx.temp!==null?` · ${wx.temp}°F`:'')):'';
  document.getElementById('moon-phase-display').textContent=night?lunarName(lunarPhase()):'';
}

window.addEventListener('resize',()=>{initStars();initPC();initMC();});
animP();
</script>
